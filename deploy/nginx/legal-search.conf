# Nginx reverse proxy configuration (optional)
# Use this if you want to run both services on port 80
# Install: sudo apt install nginx
# Deploy: sudo cp legal-search.conf /etc/nginx/sites-available/
#         sudo ln -s /etc/nginx/sites-available/legal-search.conf /etc/nginx/sites-enabled/
#         sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name _;  # Replace with your domain if you have one

    # Frontend (Next.js)
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # API (FastAPI)
    location /api/ {
        proxy_pass http://localhost:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check
    location /health {
        proxy_pass http://localhost:8000/health;
    }
}
